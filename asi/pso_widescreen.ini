; pso_widescreen.ini
;
; Widescreen now AUTO-ENABLES from the resolution aspect ratio that the launcher
; writes to widescreen.cfg (Width/Height). No manual on/off needed:
;   * 4:3 (or narrower) resolution  -> patch OFF (stock client)
;   * wider than 4:3 (16:10/16:9/21:9/32:9) -> patch ON (widescreen)
;
; Optional dev override: add an explicit `Enabled=0` or `Enabled=1` line below to
; force a state regardless of aspect (useful for A/B at the same resolution).
; Leave it out for normal auto-detect.
;
; The custom intro video (char-create) auto-picks aspect: pso_intros_16x9.mp4 at
; 16:9+, pso_intros_4x3.mp4 at 4:3. Plays in-process (Media Foundation), skippable
; with Enter, covers the stock intro. Set VideoEnable=0 to fall back to stock.
;
;   HUDScale : UI scale. 1.0 = native 16:9. (Reserved for the HUDScale path;
;              1.0 recommended.)

HUDScale=1.50
VideoEnable=1
; Decode backend: mf = in-process Media Foundation, native-res RGB32 + GPU scale
; (hardware-decoded, ZERO deps — the primary path). Auto-falls-back to ffmpeg.exe
; only if MF is genuinely unavailable (real Windows N / KN).
VideoDecoder=mf
; Boot + char-create video (2026-06-28): VideoTrigger=both plays the boot meteor
; (pso_bootseq_*) at boot, auto-continues to the title, then plays the Ep1+Ep2 intro
; (pso_intros_*) at char-create. Both are aspect-autodetected (16:9/4:3) from
; widescreen.cfg Width/Height. VideoBootPath= / VideoPath= can override the autopick.
VideoTrigger=both
; CcEscBack 2026-06-17: ESC at the char-create TOP class-select returns to char-select
; via the VERIFIED two-stage transition (play_scene(2) then Layer-2 screen-id-6 rebuild).
; Sub-screens keep their own ESC=back (gated on sub-screen depth [0xA7223C]==0).
CcEscBack=1
; IntegerScale: "bump the base render" for high-DPI screens. When 1 AND borderless
; (Windowed=2), the game renders at a CLEAN integer divisor of your screen res (capped
; ~1080p) and the present upscales by a clean Nx — e.g. on a 4K screen it renders
; 1920x1080 and presents a sharp 2x, instead of a slow non-integer/aspect-mismatched
; stretch (the Wine-without-dgVoodoo ~20 FPS cliff). No-op at <=1440p. Set Width/Height
; to your monitor's native resolution for this to pick the right divisor. Default 0.
IntegerScale=0
; NoVignette: 1 = remove the F12 / in-game-menu vignette (the dark dimming scrim
; behind the menu) for a clean view (default); 0 = stock. This is the MENU dim only,
; NOT the status-effect vignette (mod_vignette.asi is separate and unaffected).
NoVignette=1
