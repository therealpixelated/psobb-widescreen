; pso_widescreen.ini  — ships next to pso_widescreen.asi (the install's patches\ dir).
;
; A few user-facing knobs. Everything else (16:9 layout, char-create intro video,
; boot poster, resolution auto-detect, etc.) is baked into the mod and needs no
; tweaking.
;
;   Enabled  : 1 = mod on, 0 = off (stock client).
;   HUDScale : UI scale. 1.0 = native 16:9. (Reserved for the HUDScale path;
;              1.0 recommended.)
;   NoVignette : 1 = remove the F12 / in-game-MENU vignette (the dark dimming scrim
;                drawn behind the in-game menu) for a clean view; 0 = stock. Default
;                1. This is the MENU dim only — NOT the status-effect vignette
;                (mod_vignette.asi is a separate mod and is unaffected).

Enabled=1
HUDScale=1.0
NoVignette=1
