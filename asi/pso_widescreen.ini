; ======================================================================
;  pso_widescreen.ini  —  PSOBB.IO widescreen mod
; ======================================================================
;
;  TURNING IT ON: the mod auto-enables from your resolution's aspect ratio
;  (the launcher writes Width/Height to widescreen.cfg):
;     4:3 or narrower  ->  mod OFF (stock client)
;     wider than 4:3   ->  mod ON  (widescreen)
;  No manual switch needed.
;
;  HUD SCALE: set it in the LAUNCHER. The launcher writes HUDScale into
;  widescreen.cfg, and that value is PRIMARY — it overrides anything here.
;  (See HUDScale under ADVANCED if you don't use the launcher.)
;
;  Everything above the ADVANCED divider is safe to tune. Everything below
;  it is auto-derived or can break rendering — leave it alone unless you
;  know exactly what it does.
; ======================================================================


; ============================== VIDEO =================================
; The boot meteor + character-creation intro movies.

; Master on/off for the intro movies. 1 = play (default), 0 = stock (no movie).
VideoEnable=1

; Which movies play:  off | boot | charcreate | both
;   boot       = meteor clip at startup
;   charcreate = Ep1+Ep2 intro when you make a character
;   both       = both (default)
VideoTrigger=both

; 1 = Enter/Esc skips the movie (default); 0 = it plays to the end.
VideoSkippable=1


; ============================= MINIMAP ===============================
; The in-game corner minimap. The map and its box are locked together.

; Size, multiplied by your HUD scale. 1.0 = stock, 1.30 = the mod default
; (a bit larger). Lower it to shrink the minimap.
MinimapSizeScale=0.87

; Nudge the box further into the top-right corner, in design pixels.
; Negative MinimapCornerRightPx = further RIGHT; negative ...TopPx = further UP.
MinimapCornerRightPx=-20
MinimapCornerTopPx=-40

; Compass (minimap direction icon) position from the bottom-right screen corner, in design px. Bigger = further from the corner.
CompassRightPx=60
CompassBottomPx=70

; Map zoom. SMALLER = zoomed OUT (you see more around you). ~1.13 = stock,
; 0.60 = mod default. MinimapZoomEnable: 1 = apply (default), 0 = stock zoom.
MinimapZoomEnable=1
MinimapZoom=0.60


; ========================== DISPLAY / FEEL ===========================

; Remove the dark dimming scrim behind the F12 / in-game menu.
; 1 = clean view (default), 0 = stock dim. (Menu dim only — not status effects.)
NoVignette=1

; High-DPI sharpness: on a 4K / borderless setup, render at a clean integer
; divisor of your screen and upscale by a whole number (sharper + faster than
; a fractional stretch). 1 = on, 0 = off (default). No effect at 1440p or below.
; Use the launcher (or Width/Height) to set your native res so this picks the
; right divisor.
IntegerScale=0


; =========================== BOOT POSTER =============================

; The centered logo PNG over the first black "NOW LOADING" screen.
; 1 = show (default), 0 = off.
BootPosterEnabled=1


; #####################################################################
; ##                                                                 ##
; ##   ADVANCED  —  DON'T TOUCH UNLESS YOU KNOW WHAT YOU'RE DOING     ##
; ##                                                                 ##
; ##   These are auto-derived from your resolution, control internal ##
; ##   patch behavior, or can corrupt rendering if set wrong. They   ##
; ##   are listed commented-out for reference; the value shown is    ##
; ##   the built-in default. Uncomment a line only to override it.   ##
; ##                                                                 ##
; #####################################################################

; ---- Scale / resolution (the launcher + aspect auto-detect normally own these) ----

; HUDScale: UI scale. The LAUNCHER's widescreen.cfg sets this and OVERRIDES the
;   ini. Only uncomment here if you're NOT using the launcher. Clamp 0.1..10.0.
;HUDScale=1.0

; Enabled: master on/off. Normally auto-derived from aspect. Forcing 0 on a wide
;   res (or 1 on 4:3) fights the auto-detect — leave it out. Default 0.
;Enabled=0

; Windowed: 0 = exclusive fullscreen, 1 = windowed, 2 = borderless. The launcher
;   writes this and the launcher value wins. Default 1.
;Windowed=1

; Width / Height: render resolution. The launcher / your monitor supply these.
;   0 = auto. Default 0 / 0.
;Width=0
;Height=0

; GameAspect: force the aspect ratio used for the widescreen geometry. Bare float
;   ("1.7778") or "W:H" ("16:9"). Auto-detected from your res — overriding warps
;   geometry. Clamp 0.1..10.0. Default 16:9.
;GameAspect=16:9

; LogicalWidth / LogicalHeight: the engine's internal canvas (Sodaboy convention).
;   Wrong values break ALL scaling. Clamp 320..8192 / 240..8192. Default 1920 / 1080.
;LogicalWidth=1920
;LogicalHeight=1080

; FovCorrection / OverrideBackBuffer / OverrideViewport: low-level D3D overrides.
;   Default 0 each — leave off unless debugging a specific driver.
;FovCorrection=0
;OverrideBackBuffer=0
;OverrideViewport=0

; ---- Custom-feature master toggles (1 = on = the shipped behavior) ----

; PatchMinimap: the entire top-right minimap feature. 0 disables the size/corner/
;   zoom block above. Default 1.
;PatchMinimap=1

; PatchRuneScale: scale the title rune emblem with the UI. Default 1.
;PatchRuneScale=1

; PatchCharSelect: the 16:9 character-select layout. Default 1.
;PatchCharSelect=1

; PatchStreakScale: keep the title light-streak positioned at any HUD scale. Default 1.
;PatchStreakScale=1

; PatchSplashPhase2: extra splash quad-table patch (dev). Default 0.
;PatchSplashPhase2=0

; ---- Video internals (the defaults ship the right files; rarely touched) ----

; VideoDecoder: mf = in-process Media Foundation (default, zero deps, auto-falls
;   back to ffmpeg if MF is missing); ffmpeg / external = use ffmpeg.exe. Default mf.
;VideoDecoder=mf

; VideoPath / VideoBootPath: explicit movie files. Left unset = aspect auto-pick
;   (16x9 vs 4x3). Setting either DISABLES the auto-pick for that movie.
;VideoPath=patches\video\pso_intros_16x9.mp4
;VideoBootPath=patches\video\pso_bootseq_16x9.mp4

; VideoFfmpeg: path to ffmpeg.exe (only used when VideoDecoder=ffmpeg). Default below.
;VideoFfmpeg=patches\video\ffmpeg.exe

; VideoMaxSeconds: hard cap per movie (0 = play to end). Clamp 0..600. Default 0.
;VideoMaxSeconds=0

; VideoSkipDebounceMs: ignore the skip key this long after the movie starts (stops a
;   held Enter from skipping instantly). Clamp 0..10000. Default 500.
;VideoSkipDebounceMs=500

; ---- Boot poster internals ----

; BootPosterPath: the PNG to show. Default patches\psobb_boot_poster.png.
;BootPosterPath=patches\psobb_boot_poster.png

; BootPosterMaxScreenPct: max % of the screen the poster covers. Clamp 1..100. Default 80.
;BootPosterMaxScreenPct=80

; BootPosterDisableAfterFloor / ...AfterSplashAtlas: auto-hide triggers. Default 1 each.
;BootPosterDisableAfterFloor=1
;BootPosterDisableAfterSplashAtlas=1

; BootPosterMaxSeconds: hard cap before the poster auto-hides. Clamp 0..600. Default 30.
;BootPosterMaxSeconds=30

; ---- Diagnostics (off unless you're chasing a bug) ----

; DebugLogsEnabled: write pso_widescreen.log. Default 0.
;DebugLogsEnabled=0

; DebugLogVerbose: firehose logging (needs DebugLogsEnabled=1 as well). Default 0.
;DebugLogVerbose=0

; VideoDiag: draw a red diagnostic half-quad over the movie. Default 0.
;VideoDiag=0
