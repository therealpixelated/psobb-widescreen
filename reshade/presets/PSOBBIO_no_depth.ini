; PSOBBIO_no_depth.ini - color-only fallback preset (no depth-dependent effects).
;
; Use this when the depth acceptance gate fails on your chain (DisplayDepth.fx
; shows flat / garbage instead of a near-dark/far-light gradient). PSO_SSAO and
; PSO_DOF need depth and are omitted; SMAA, Cel and HDR are color-only and work
; on any chain. The installer auto-emits this when run with -NoDepth.
;
; Values are identical to PSOBBIO.ini for the effects that remain.

Techniques=SMAA,PSO_CelShader,PSO_HDRToneMap
TechniqueSorting=SMAA,PSO_CelShader,PSO_HDRToneMap

PreprocessorDefinitions=SMAA_PRESET_HIGH=1,SMAA_EDGE_DETECTION=1,SMAA_PREDICATION=0

[SMAA.fx]
EdgeDetectionType=1.000000
EdgeDetectionThreshold=0.100000
MaxSearchSteps=16.000000
MaxSearchStepsDiagonal=8.000000
CornerRounding=25.000000
DebugOutput=0.000000
PredicationEnabled=0.000000

[PSO_CelShader.fx]
EdgeStrength=0.700000
EdgeFilter=0.600000
EdgeThickness=0.800000
PaletteType=0
UseYuvLuma=1
ColorRounding=1

[PSO_HDRToneMap.fx]
TonemapType=1
TonemapMask=0
MaskStrength=0.300000
ToneAmount=0.300000
BlackLevels=0.060000
Exposure=1.000000
Luminance=1.000000
WhitePoint=0.940000

[DisplayDepth.fx]
iUIShow=0
