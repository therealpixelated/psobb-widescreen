; PSOBBIO.ini - curated ReShade preset for PSOBB matching the anzz1 widescreen look.
;
; The installer REGENERATES the Techniques= line below from widescreen.cfg
; (omitting any effect whose flag = 0, and dropping PSO_SSAO/PSO_DOF when the
; depth gate fails / -NoDepth). The per-uniform values are the anzz1 defaults,
; ported 1:1 from psobb_patches/psobb_widescreen/res/*.fx. Order is the fixed
; anzz1 chain: SMAA -> SSAO -> Cel -> DOF -> HDR.
;
; SMAA values are set as PreprocessorDefinitions (ReShade compiles SMAA from
; preprocessor defs, matching its built-in "High" preset + luma edge detection).

Techniques=SMAA,PSO_SSAO,PSO_CelShader,PSO_DOF,PSO_HDRToneMap
TechniqueSorting=SMAA,PSO_SSAO,PSO_CelShader,PSO_DOF,PSO_HDRToneMap

PreprocessorDefinitions=SMAA_PRESET_HIGH=1,SMAA_EDGE_DETECTION=1,SMAA_PREDICATION=0,PSO_DOF_DISTANTBLUR=1

[SMAA.fx]
EdgeDetectionType=1.000000
EdgeDetectionThreshold=0.100000
MaxSearchSteps=16.000000
MaxSearchStepsDiagonal=8.000000
CornerRounding=25.000000
DebugOutput=0.000000
PredicationEnabled=0.000000

[PSO_SSAO.fx]
fSSAO_Samples=16
fSSAO_minsamples=2
fSSAO_Radius=12.000000
fSSAO_aoClamp=0.100000
fSSAO_diffarea=0.200000
fSSAO_gdisplace=0.400000
fSSAO_aoWidth=2.000000
fSSAO_noiseamount=0.000200
fSSAO_lumThreshold=0.300000
fSSAO_miststart=0.050000
fSSAO_mistend=0.700000

[PSO_CelShader.fx]
EdgeStrength=0.700000
EdgeFilter=0.600000
EdgeThickness=0.800000
PaletteType=0
UseYuvLuma=1
ColorRounding=1

[PSO_DOF.fx]
f2FocusPosition=0.500000,0.900000
fFullFocusRange=0.100000
fNoFocusRange=0.400000
fDoFAmount=25.000000

[PSO_HDRToneMap.fx]
TonemapType=1
TonemapMask=0
MaskStrength=0.300000
ToneAmount=0.300000
BlackLevels=0.060000
Exposure=1.000000
Luminance=1.000000
WhitePoint=0.940000

[DisplayDepth.fx]
iUIShow=0
